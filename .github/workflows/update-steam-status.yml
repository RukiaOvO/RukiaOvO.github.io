name: Update Steam status

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.163.3
      STEAM_ID: "76561198417009401"
      STEAM_WEB_API_KEY: ${{ secrets.STEAM_WEB_API_KEY }}
      STEAM_STATUS_OUTPUT: "static/data/steam-status.json"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Fetch Steam status
        run: node scripts/update-steam-status.mjs

      - name: Commit updated status
        id: auto-commit-action
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "chore: update steam status"
          file_pattern: static/data/steam-status.json

      - name: Setup Pages
        if: steps.auto-commit-action.outputs.changes_detected == 'true'
        id: pages
        uses: actions/configure-pages@v6

      - name: Install Hugo
        if: steps.auto-commit-action.outputs.changes_detected == 'true'
        run: |
          curl -L -o hugo.tar.gz https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz
          tar -xzf hugo.tar.gz
          sudo mv hugo /usr/local/bin/hugo

      - name: Build Pages artifact
        if: steps.auto-commit-action.outputs.changes_detected == 'true'
        run: hugo --gc --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload Pages artifact
        if: steps.auto-commit-action.outputs.changes_detected == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        if: steps.auto-commit-action.outputs.changes_detected == 'true'
        uses: actions/deploy-pages@v5
