{{ $items := hugo.Data.homepage.highlights }}
<section class="home-section">
  <div class="home-panel">
    <div class="home-section-heading">
      <p class="home-eyebrow">At a glance</p>
      <h2>What this site is anchored around</h2>
    </div>
    <div class="home-highlights">
      {{ range $items }}
        <div class="home-highlight">
          <p class="home-highlight__label">{{ .label }}</p>
          <p class="home-highlight__value">{{ .value }}</p>
        </div>
      {{ end }}
    </div>
  </div>
</section>
