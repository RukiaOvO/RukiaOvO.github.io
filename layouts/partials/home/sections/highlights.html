{{ $homepage := index hugo.Data (default "zh-cn" .Site.Language.Lang) | default hugo.Data.homepage }}
{{ $items := $homepage.highlights }}
<section class="home-section">
  <div class="home-panel">
    <div class="home-section-heading">
      <p class="home-eyebrow">{{ $homepage.sections.highlightsEyebrow }}</p>
      <h2>{{ $homepage.sections.highlightsTitle }}</h2>
    </div>
    <div class="home-highlights">
      {{ range $items }}
        <div class="home-highlight">
          <p class="home-highlight__label">{{ .label }}</p>
          <p class="home-highlight__value">{{ .value }}</p>
        </div>
      {{ end }}
    </div>
  </div>
</section>
