{{ $items := hugo.Data.homepage.focus }}
<section class="home-section">
  <div class="home-section-heading">
    <p class="home-eyebrow">Focus</p>
    <h2>Core areas I am building through</h2>
    <p>The homepage is organized around a small number of durable themes so future changes can extend sections instead of rewriting them.</p>
  </div>
  <div class="home-focus-grid">
    {{ range $items }}
      <article class="home-focus-card">
        <div class="home-focus-card__badge">{{ .badge }}</div>
        <h3>{{ .title }}</h3>
        <p>{{ .description }}</p>
      </article>
    {{ end }}
  </div>
</section>
