{{ $homepage := .Site.Language.Params.homepageText }}
{{ $items := $homepage.focus }}
<section class="home-section">
  <div class="home-section-heading">
    <p class="home-eyebrow">{{ $homepage.sections.focusEyebrow }}</p>
    <h2>{{ $homepage.sections.focusTitle }}</h2>
    <p>{{ $homepage.sections.focusIntro }}</p>
  </div>
  <div class="home-focus-grid">
    {{ range $items }}
      <article class="home-focus-card">
        <div class="home-focus-card__badge">{{ .badge }}</div>
        <h3>{{ .title }}</h3>
        <p>{{ .description }}</p>
      </article>
    {{ end }}
  </div>
</section>
