{{ $homepage := .Site.Language.Params.homepageText }}
<section class="home-section">
  <div class="home-panel home-panel--split">
    <div class="home-section-heading">
      <p class="home-eyebrow">{{ $homepage.sections.aboutEyebrow }}</p>
      <h2>{{ $homepage.sections.aboutTitle }}</h2>
      <p>{{ $homepage.sections.aboutIntro }}</p>

    <div class="home-about-actions">
      <a class="home-button home-button--primary" href="/about/">{{ $homepage.sections.aboutPrimaryCta }}</a>
      <a class="home-button home-button--ghost" href="mailto:1403555427@qq.com">{{ $homepage.sections.aboutSecondaryCta }}</a>
    </div>
  </div>
</section>
